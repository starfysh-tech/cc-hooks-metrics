# Gitleaks configuration for cc-hooks-metrics
# https://github.com/gitleaks/gitleaks

title = "gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Global allowlist for common false positives"
paths = [
  '''node_modules/''',
  '''vendor/''',
  '''.venv/''',
  '''venv/''',
  '''\.git/''',
  '''\.gitignore$''',
  '''package-lock\.json$''',
  '''yarn\.lock$''',
  '''pnpm-lock\.yaml$''',
  '''poetry\.lock$''',
  '''Cargo\.lock$''',
  '''go\.sum$'''
]

commits = [
  "5af18f6ae49d637d277989432b3b2c919acb3177"  # test_parse_headers_basic: "Authorization=Bearer token123" is a synthetic test value
]

regexes = [
  '''example\.com''',
  '''localhost''',
  '''127\.0\.0\.1''',
  '''0\.0\.0\.0''',
  '''YOUR_API_KEY''',
  '''INSERT.*HERE''',
  '''REPLACE.*WITH''',
  '''TODO''',
  '''FIXME'''
]
